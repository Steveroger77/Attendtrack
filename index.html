    <script>
      // Stub WebSocket to prevent benign HMR/socket errors in the sandboxed dev environment
      (function() {
        try {
          class MockWebSocket extends EventTarget {
            constructor(url, protocols) {
              super();
              this.url = url;
              this.protocols = protocols;
              this.readyState = 1; // OPEN
              this.binaryType = 'blob';
              
              // Trigger open event asynchronously so event listeners can be attached first
              setTimeout(() => {
                const openEvt = new Event('open');
                this.dispatchEvent(openEvt);
                if (typeof this.onopen === 'function') this.onopen(openEvt);
              }, 10);
            }
            send(data) {
              // Silently ingest any heartbeat or ping data
            }
            close() {
              this.readyState = 3; // CLOSED
              setTimeout(() => {
                const closeEvt = new CloseEvent('close', { wasClean: true, code: 1000 });
                this.dispatchEvent(closeEvt);
                if (typeof this.onclose === 'function') this.onclose(closeEvt);
              }, 10);
            }
          }
          MockWebSocket.CONNECTING = 0;
          MockWebSocket.OPEN = 1;
          MockWebSocket.CLOSING = 2;
          MockWebSocket.CLOSED = 3;
          
          window.WebSocket = MockWebSocket;
          console.log('WS connection stub successfully initialized');
        } catch (e) {
          console.error('Failed to stub WebSocket:', e);
        }
      })();
    </script>
